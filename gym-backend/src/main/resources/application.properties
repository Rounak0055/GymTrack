spring.application.name=gym-backend

# Optional local overrides (gitignored) — copy from application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

# Render sets PORT; local default is 8080
server.port=${PORT:8080}

# Database — override on Render via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gym_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
